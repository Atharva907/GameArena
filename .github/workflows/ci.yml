name: CI

on:
  push:
  pull_request:

jobs:
  validation:
    name: Validate, build, and smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: gamearena
          POSTGRES_USER: gamearena
          POSTGRES_PASSWORD: gamearena-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gamearena -d gamearena"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: development
      BACKEND_PORT: 4000
      FRONTEND_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://gamearena:gamearena-dev@127.0.0.1:5432/gamearena?schema=public
      SECRET_KEY: ci-secret-key-ci-secret-key-ci-secret-key
      JWT_SECRET: ci-secret-key-ci-secret-key-ci-secret-key
      NODEMAILER_EMAIL: dev@example.com
      NODEMAILER_PASSWORD: dev-password
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dev
      NEXT_PUBLIC_CLOUDINARY_API_KEY: dev
      CLOUDINARY_SECRET_KEY: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Validate backend environment
        run: npm run backend:validate

      - name: Lint
        run: npm run lint -- --quiet

      - name: Build frontend
        run: npm run build

      - name: Prepare database
        run: |
          npm --prefix backend run db:generate
          npm --prefix backend run db:migrate:deploy
          npm run seed
          npm run seed:products

      - name: Start backend
        run: nohup npm run backend:start > backend.log 2>&1 &

      - name: Start frontend
        run: nohup npm run start > frontend.log 2>&1 &

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4000/api/health >/dev/null && curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become ready"
          echo "--- backend.log ---"
          cat backend.log || true
          echo "--- frontend.log ---"
          cat frontend.log || true
          exit 1

      - name: Smoke test
        run: npm run test:smoke

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for container health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4000/api/health >/dev/null && curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Dockerized services did not become ready"
          docker compose logs --no-color --tail=200
          exit 1

      - name: Docker smoke test
        run: npm run test:smoke

      - name: Stop containers
        if: always()
        run: docker compose down -v
