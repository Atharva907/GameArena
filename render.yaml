services:
  - type: web
    name: gamearena-backend
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm run db:migrate:deploy && npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: gamearena-postgres
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://gamearena-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: NODEMAILER_HOST
        sync: false
      - key: NODEMAILER_PORT
        value: "465"
      - key: NODEMAILER_SECURE
        value: "true"
      - key: NODEMAILER_EMAIL
        sync: false
      - key: NODEMAILER_PASSWORD
        sync: false

  - type: web
    name: gamearena-frontend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BASE_URL
        value: https://gamearena-frontend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://gamearena-backend.onrender.com/api
      - key: NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT
        sync: false

databases:
  - name: gamearena-postgres
    plan: basic-256mb
    region: oregon
    databaseName: gamearena
    user: gamearena
    postgresMajorVersion: "18"
